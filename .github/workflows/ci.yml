name: GuardianRecon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve project paths
        run: |
          if [ -f guardian_recon/requirements.txt ]; then
            echo "REQ_FILE=guardian_recon/requirements.txt" >> "$GITHUB_ENV"
          elif [ -f requirements.txt ]; then
            echo "REQ_FILE=requirements.txt" >> "$GITHUB_ENV"
          else
            echo "No requirements.txt found in guardian_recon/ or the repository root." >&2
            exit 1
          fi

          if [ -d guardian_recon/tests ]; then
            echo "TEST_DIR=guardian_recon/tests" >> "$GITHUB_ENV"
          elif [ -d tests ]; then
            echo "TEST_DIR=tests" >> "$GITHUB_ENV"
          else
            echo "No tests directory found in guardian_recon/ or the repository root." >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "$REQ_FILE"
          pip install pytest fastapi uvicorn sqlalchemy

      - name: Run tests
        run: |
          pytest "$TEST_DIR" -v
