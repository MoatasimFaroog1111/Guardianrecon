name: GuardianRecon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f guardian_recon/requirements.txt ]; then
            pip install -r guardian_recon/requirements.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "Could not find requirements.txt in guardian_recon/ or repository root" >&2
            exit 1
          fi
          pip install pytest fastapi uvicorn sqlalchemy

      - name: Run tests
        run: |
          if [ -d guardian_recon/tests ]; then
            pytest guardian_recon/tests/ -v
          elif [ -d tests ]; then
            pytest tests/ -v
          else
            echo "Could not find tests/ in guardian_recon/ or repository root" >&2
            exit 1
          fi
